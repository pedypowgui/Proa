<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Guilherme Maravilhoso</title>

        <script>

            var pesquisa = prompt("Pesquisar planeta: ");

            if(pesquisarPlaneta(pesquisa)){
                alert(`${pesquisa} EXISTE no array.`);
            } else {
                alert(`${pesquisa} NÃO EXISTE no array.`)
            }

            function pesquisarPlaneta(pesquisa){
                var planetas = Array("Terra", "Marte", "Plutão", "Vênus", "Júpiter", "Saturno");
                
                for(var planeta of planetas){
                    if(planeta == pesquisa){
                        return true;
                    }
                }
                
                return false;
            }

        </script>

    </head>
