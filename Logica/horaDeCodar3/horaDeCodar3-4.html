        <title>Guilherme Brito Lindão</title>

        <script>

            var cont = 0;
            var soma = 0;            

            for(let i = 15; i <= 100; i++){
                cont++;
                soma += i;
            }

            alert(`Média de todos os números de 15(inclusive) a 100(inclusive):\n${soma/cont}`);

        </script>
