<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gui lindão</title>

        <script>

            var nums = Array(10);
            var numsSelecionados = Array();
            var numsNaoSelecionados = Array();
            
            for(let i = 0; i < nums.length; i++){
                nums[i] = Number(prompt(`Digite o ${i + 1}º número: `));
            }
            
            nums.forEach(num => {
                if(num >= 24 && num <= 42){
                    numsSelecionados.push(num);
                } else {
                    numsNaoSelecionados.push(num);
                }
            })

            alert(`Todos os números digitados entre 24, inclusive, e 42, inclusive:\n${numsSelecionados}`);
            alert(`Todos os números digitados fora do intervalo 24, inclusive, e 42, inclusive:\n${numsNaoSelecionados}`);
            
        </script>

    </head>
    <body>
    </body>
</html>
