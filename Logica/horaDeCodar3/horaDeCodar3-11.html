<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gui lindão</title>

        <script>

            var n = Number(prompt("Digite um número: "));
            for(let i = 1; i <= n; i++){
                for(let j = 1; j <= 10; j++){
                    alert(`
                        ${i} x ${j} = ${i * j}
                    `);
                }
            }
            
        </script>

    </head>
    <body>
    </body>
</html>
