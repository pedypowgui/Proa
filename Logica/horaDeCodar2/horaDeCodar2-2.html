<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Guilherme gatão</title>

        <script>
            var num = prompt("Digite um número");

            if(num == 0){
                alert("O número digitado é igual a zero");
            } else if(num > 0){
                alert("O número digitado é positivo");
            } else if(num < 0){
                alert("O número digitado é negativo");
            }
        </script>

    </head>
    <body>   
    </body>
</html>
