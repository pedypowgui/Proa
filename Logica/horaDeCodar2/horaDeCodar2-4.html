    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Guilherme esbelto</title>

        <script>

            var n1, n2, n3;
            n1 = Number(prompt("Digite o primeiro valor: "));
            n2 = Number(prompt("Digite o segundo valor: "));
            n3 = Number(prompt("Digite o terceiro valor: "));
  
            if(n1 < n2 && n1 < n3){
                alert("A soma dos maiores valores, " + n2 + " e " + n3 + " é: " + (n2 + n3));
            } else if (n2 < n1 && n2 < n3){
                alert("A soma dos maiores valores, " + n1 + " e " + n3 + "  é: " + (n1 + n3));
            } else if (n3 < n1 && n3 < n2){
                alert("A soma dos maiores valores, " + n1 + " e " + n2 + " é: " + (n1 + n2));
            }

        </script>
    </head>
