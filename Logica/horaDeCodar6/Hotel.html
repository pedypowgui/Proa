<html>
	<head>
		<script>

			const senha = 2678;

			var nome, senhaUser;

			alert("Bem vindo ao Master Hotel G Brito");

			nome = prompt("Por favor insira seu nome: ");
			
			for(var i = 0; i < 3; i++){
				senhaUser = prompt("Digite a senha para validar sua identidade: ");
				if(senhaUser != senha && i == 2){
					alert("Senha incorreta 3 vezes seguidas, bloqueando todos os acessos.");
					window.close();
				} else if (senhaUser != senha){
					alert("Senha incorreta, tente novamente...");
				} else {
					alert(`Bem-vindo ao Master Hotel G Brito, ${nome}. É um imenso prazer ter você por aqui`);
					break;
				}
			}

			function inicio() {

				var escolha = parseInt(prompt('Selecione uma opção\n1.) Reserva de Quartos\n2.) Cadastro de Hóspedes\n3.) Eventos\n4.) Ar-Condicionado\n5.) Abastecimento\n6.) Relatórios Operacionais\n7.) Sair'));

				switch(escolha){
					case 1:
						reserva_quartos();
						break;
					case 2:
						cadastro_hospedes();
						break;
					case 3:
						eventos();
						break;
					case 4:
						arCondicionado();
						break;
					case 5:
						abastecer_carros();
						break;
					case 6: 
						relatoriosOperacionais();
						break;
					case 7:
						sair();
						break;
					default:
						erro();
				}
			}		

			function reserva_quartos() {
				alert('Master Hotel G. Brito - RESERVA DE QUARTOS');
				inicio();
			}

			function cadastro_hospedes() {
				alert('Master Hotel G. Brito - CADASTRO DE HÓSPEDES');
				inicio();
			}

			function eventos(){
				alert('Master Hotel G. Brito - CADASTRO DE HÓSPEDES');
				inicio();
			}

			function arCondicionado(){
				alert('Master Hotel G. Brito - CADASTRO DE HÓSPEDES');
				inicio();
			}

			function abastecer_carros() {
				alert('Master Hotel G Brito - ABASTECER');
				inicio();
			}

			function relatoriosOperacionais(){
				alert('Master Hotel G. Brito - CADASTRO DE HÓSPEDES');
				inicio();
			}

			function erro() {
				alert('Por favor, informe um número de 1 a 7');
				inicio();
			}

			function sair() {
				var confirma = confirm('Você deseja sair?');
				if (confirma) {
					alert(`Muito obrigado, e até logo, ${nome}`);
					window.close();
				} else {
					inicio();
				}
			}		
			
			inicio();
		</script>
	</head>
	<body>
	</body>
</html>
